<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klasowy TikTok 🎲</title>

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .container { position: relative; width: 100%; max-width: 450px; height: 100vh; margin: 0 auto; background: #111; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; bottom: 40px; left: 15px; right: 80px; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); }
        .user-bio { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        .video-desc { font-size: 0.95rem; opacity: 0.9; }
        .side-bar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 20; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .btn-shuffle { background: #ff0050; color: white; }
        .btn-share { background: #00f2ea; color: #000; }
        #loader { position: absolute; text-align: center; z-index: 5; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader">Ładowanie filmów...</div>
    <video id="videoPlayer" loop playsinline></video>
    
    <div class="overlay">
        <div id="userBio" class="user-bio"></div>
        <div id="videoDesc" class="video-desc"></div>
    </div>

    <div class="side-bar">
        <button class="circle-btn btn-share" onclick="shareVideo()">🔗</button>
        <button class="circle-btn btn-shuffle" onclick="losujFilm()">🎲</button>
    </div>
</div>

<script>
    // --- TUTAJ WKLEJ LINK Z GOOGLE SCRIPT ---
const BOT_URL = "https://script.google.com/macros/s/AKfycbzTobg3X0phtucqRfwKJ1iXCB9nBmLyxqxo_89MUc0g6-CYjLDtfrmLbaXOyMeAgAcsZg/exec"; 

    let bazaFilmow = [];
    let ostatni = -1;

    async function pobierzFilmy() {
        try {
            const r = await fetch(BOT_URL);
            bazaFilmow = await r.json();
            document.getElementById('loader').style.display = 'none';
            losujFilm();
        } catch (e) { document.getElementById('loader').innerText = "Błąd bazy!"; }
    }

    function losujFilm() {
        if (bazaFilmow.length === 0) return;
        let n;
        do { n = Math.floor(Math.random() * bazaFilmow.length); } while (n === ostatni && bazaFilmow.length > 1);
        ostatni = n;
        const f = bazaFilmow[n];
        const p = document.getElementById('videoPlayer');
        p.src = f.url;
        document.getElementById('userBio').innerText = f.bio;
        document.getElementById('videoDesc').innerText = f.opis;
        p.play().catch(() => console.log("Kliknij ekran, by odtworzyć"));
    }

    function shareVideo() {
        const url = document.getElementById('videoPlayer').src;
        if (navigator.share) { navigator.share({ title: 'Klasowy TikTok', url: url }); }
        else { alert("Link: " + url); }
    }

    window.onload = pobierzFilmy;
</script>
</body>
</html>
