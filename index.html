<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasowy TikTok</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: black; color: white; font-family: sans-serif; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }
        .overlay { position: absolute; bottom: 50px; left: 20px; z-index: 10; pointer-events: none; }
        .owner { font-weight: bold; font-size: 1.2rem; }
        .btn-random { position: absolute; right: 20px; bottom: 100px; width: 60px; height: 60px; border-radius: 50%; border: none; background: #ff0050; color: white; font-size: 30px; cursor: pointer; z-index: 20; }
    </style>
</head>
<body>

<div class="video-container">
    <iframe id="player" src="" allow="autoplay"></iframe>
    
    <div class="overlay">
        <div id="owner" class="owner"></div>
        <div id="filename"></div>
    </div>

    <button class="btn-random" onclick="nextVideo()">🎲</button>
</div>

<script>
    const url = "https://script.google.com/macros/s/AKfycbwFlyCsAm_1p9WSssyk-b-pYRGxnsAJ7SDNvhV_nHkKgglcBhcNih4hW9WAbnmlVbFNjQ/exec";
    let videos = [];

    async function loadVideos() {
        const response = await fetch(url);
        videos = await response.json();
        nextVideo();
    }

    function nextVideo() {
        if (videos.length === 0) return;
        const video = videos[Math.floor(Math.random() * videos.length)];
        document.getElementById('player').src = "https://drive.google.com/file/d/" + video.id + "/preview";
        document.getElementById('owner').innerText = "@" + video.owner;
        document.getElementById('filename').innerText = video.name;
    }

    window.onload = loadVideos;
</script>

</body>
</html>
