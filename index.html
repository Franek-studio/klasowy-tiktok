<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klasowy TikTok 🎲</title>

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .container { position: relative; width: 100%; max-width: 450px; height: 100vh; margin: 0 auto; background: #000; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        .overlay { position: absolute; bottom: 40px; left: 15px; right: 80px; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); pointer-events: none; }
        .user-bio { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; color: #00f2ea; }
        .video-desc { font-size: 0.95rem; opacity: 0.9; }
        .side-bar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 20; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-shuffle { background: #ff0050; color: white; }
        .btn-share { background: #00f2ea; color: #000; }
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; background: #111; z-index: 100; }
        .spinner { border: 4px solid #333; border-left-color: #ff0050; width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="loader">
        <div class="spinner"></div>
        <p>Pobieranie hitów...</p>
    </div>
    
    <iframe id="videoFrame" allow="autoplay"></iframe>
    
    <div class="overlay">
        <div id="userBio" class="user-bio"></div>
        <div id="videoDesc" class="video-desc"></div>
    </div>

    <div class="side-bar">
        <button class="circle-btn btn-share" onclick="shareVideo()">🔗</button>
        <button class="circle-btn btn-shuffle" onclick="losujFilm()">🎲</button>
    </div>
</div>

<script>
    // TWÓJ SPRAWDZONY LINK DO BOTA
    const BOT_URL = "https://script.google.com/macros/s/AKfycbwFlyCsAm_1p9WSssyk-b-pYRGxnsAJ7SDNvhV_nHkKgglcBhcNih4hW9WAbnmlVbFNjQ/exec"; 

    let bazaFilmow = [];
    let ostatni = -1;

    async function pobierzFilmy() {
        try {
            console.log("Łączenie z botem...");
            const r = await fetch(BOT_URL);
            bazaFilmow = await r.json();
            console.log("Pobrano danych:", bazaFilmow.length);
            
            if (bazaFilmow.length > 0) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('videoFrame').style.display = 'block';
                losujFilm();
            } else {
                document.getElementById('loader').innerHTML = "<p>Folder jest pusty!<br>Wrzuć filmy na Dysk Google.</p>";
            }
        } catch (e) { 
            console.error("Błąd bazy:", e);
            document.getElementById('loader').innerHTML = "<p>Błąd połączenia!<br>Sprawdź czy bot jest wdrożony jako 'Każdy'.</p>"; 
        }
    }

    function losujFilm() {
        if (bazaFilmow.length === 0) return;
        let n;
        do { n = Math.floor(Math.random() * bazaFilmow.length); } while (n === ostatni && bazaFilmow.length > 1);
        ostatni = n;
        const f = bazaFilmow[n];
        const frame = document.getElementById('videoFrame');
        
        if (f.id) {
            frame.src = "https://drive.google.com/file/d/" + f.id + "/preview";
            document.getElementById('userBio').innerText = f.bio;
            document.getElementById('videoDesc').innerText = f.opis;
        }
    }

    function shareVideo() {
        const frame = document.getElementById('videoFrame');
        if (navigator.share) { navigator.share({ title: 'Klasowy TikTok', url: frame.src }); } 
        else { alert("Link: " + frame.src); }
    }

    window.onload = pobierzFilmy;
</script>
</body>
</html>
