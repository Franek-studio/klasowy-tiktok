<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klasowy TikTok 🎲</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: black; color: white; font-family: sans-serif; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Nakładka dolna z profilem */
        .overlay { position: absolute; bottom: 65px; left: 20px; right: 90px; z-index: 10; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .profile-section { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; pointer-events: auto; }
        .profile-pic { width: 55px; height: 55px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .owner { font-weight: bold; color: #00f2ea; font-size: 1.1rem; }
        #filename { font-size: 0.85rem; opacity: 0.9; }

        /* Przyciski boczne */
        .side-bar { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 15px; z-index: 20; }
        .btn { width: 55px; height: 55px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: 0.2s; }
        .btn:active { transform: scale(0.9); }
        
        .btn-profiles { background: #00f2ea; color: black; } /* Lista profili */
        .btn-upload { background: #25d366; } /* Wysyłanie */
        .btn-share { background: #555; font-size: 20px; } /* Udostępnianie */
        .btn-random { background: #ff0050; } /* Następny film */

        /* Menu Profile Klasy */
        #profiles-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; display: none; 
            flex-direction: column; padding: 20px; box-sizing: border-box; text-align: center;
        }
        .profiles-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; justify-items: center; overflow-y: auto; }
        .profile-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; }
        .profile-item img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #00f2ea; margin-bottom: 8px; object-fit: cover; }
        .profile-item span { font-weight: bold; }
        
        .close-btn { background: #ff0050; border: none; color: white; padding: 12px 30px; border-radius: 25px; margin-top: 30px; cursor: pointer; font-weight: bold; }
        
        /* Pasek ładowania */
        #loader-bar { position: fixed; top: 0; left: 0; width: 0%; height: 5px; background: #25d366; z-index: 2000; transition: 0.3s; }
    </style>
</head>
<body>

<div id="loader-bar"></div>

<div class="video-container">
    <div id="player-wrapper" style="width:100%; height:100%;"></div>
    
    <div class="overlay">
        <div class="profile-section" onclick="toggleMenu(true)">
            <img id="user-avatar" class="profile-pic" src="">
            <div id="owner" class="owner">@wczytywanie...</div>
        </div>
        <div id="filename">Szukam filmów na Dysku...</div>
    </div>

    <div class="side-bar">
        <button class="btn btn-profiles" onclick="toggleMenu(true)">👥</button>
        <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">📤</button>
        <button class="btn btn-share" onclick="shareVideo()">🔗</button>
        <button class="btn btn-random" onclick="nextVideo()">🎲</button>
    </div>
</div>

<input type="file" id="fileInput" style="display:none" accept="video/*" onchange="uploadFile(this)">

<div id="profiles-menu">
    <h2 style="margin-top: 20px;">👥 Profile Klasy</h2>
    <div class="profiles-grid">
        <a href="franek.html" class="profile-item">
            <img src="https://drive.google.com/thumbnail?sz=w400&id=1s0AT3NdWS_Ckd3g91HCEotQe4in0LUYt">
            <span>Franek</span>
        </a>
        <a href="klasa.html" class="profile-item">
            <img src="https://drive.google.com/thumbnail?sz=w400&id=1qlyomGfB3xiLOuIz1o6TE1-8O19J4TsZ">
            <span>Klasa 2015</span>
        </a>
    </div>
    <button class="close-btn" onclick="toggleMenu(false)">POWRÓT</button>
</div>

<script>
    // TWÓJ DZIAŁAJĄCY LINK DO BOTA
    const url = "https://script.google.com/macros/s/AKfycbwFlyCsAm_1p9WSssyk-b-pYRGxnsAJ7SDNvhV_nHkKgglcBhcNih4hW9WAbnmlVbFNjQ/exec";

    // Baza profilówek
    const profilePhotos = {
        "luczakfranek2015": "1s0AT3NdWS_Ckd3g91HCEotQe4in0LUYt",
        "klasa 2015": "1qlyomGfB3xiLOuIz1o6TE1-8O19J4TsZ"
    };

    let videos = [];
    let currentVideoId = "";

    function toggleMenu(show) { document.getElementById('profiles-menu').style.display = show ? 'flex' : 'none'; }

    // Pobieranie listy filmów
    async function loadVideos() {
        try {
            const resp = await fetch(url);
            videos = await resp.json();
            if (videos.length > 0) {
                nextVideo();
            } else {
                document.getElementById('owner').innerText = "Folder jest pusty!";
                document.getElementById('filename').innerText = "Wrzuć film przyciskiem 📤";
            }
        } catch (e) { 
            console.error(e);
            alert("Błąd połączenia! Sprawdź czy link w kodzie jest poprawny."); 
        }
    }

    // Wyświetlanie losowego filmu
    function nextVideo() {
        if (videos.length === 0) return;
        const video = videos[Math.floor(Math.random() * videos.length)];
        currentVideoId = video.id;
        
        // Wstawienie iframe z filmem
        document.getElementById('player-wrapper').innerHTML = `<iframe src="https://drive.google.com/file/d/${video.id}/preview" allow="autoplay"></iframe>`;
        
        const cleanOwner = (video.owner || "nieznany").toLowerCase().trim();
        document.getElementById('owner').innerText = "@" + (video.owner || "Anonim");
        document.getElementById('filename').innerText = video.name;

        // Dopasowanie zdjęcia profilowego
        let photoID = profilePhotos[cleanOwner] || "1qlyomGfB3xiLOuIz1o6TE1-8O19J4TsZ";
        document.getElementById('user-avatar').src = `https://drive.google.com/thumbnail?sz=w500&id=${photoID}`;
    }

    // Funkcja wysyłania plików
    async function uploadFile(input) {
        const file = input.files[0];
        if (!file) return;
        let nick = prompt("Podaj swój nick (np. luczakfranek2015):");
        if (!nick) return;

        document.getElementById('loader-bar').style.width = "50%";
        const reader = new FileReader();
        reader.onload = async function() {
            const base64 = reader.result.split(',')[1];
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ base64: base64, mimetype: file.type, filename: nick.trim() + " - " + file.name })
                });
                document.getElementById('loader-bar').style.width = "100%";
                alert("Ezzzz! Wysłano! Odśwież stronę za chwilę.");
                setTimeout(() => { location.reload(); }, 1500);
            } catch (e) { 
                alert("Błąd wysyłania!"); 
                document.getElementById('loader-bar').style.width = "0%";
            }
        };
        reader.readAsDataURL(file);
    }

    // FUNKCJA UDOSTĘPNIANIA (🔗)
    function shareVideo() {
        if (!currentVideoId) {
            alert("Najpierw załaduj film!");
            return;
        }
        const videoLink = "https://drive.google.com/file/d/" + currentVideoId + "/view";
        
        if (navigator.share) {
            navigator.share({
                title: 'Klasowy TikTok',
                url: videoLink,
            }).catch(() => {});
        } else {
            const el = document.createElement('textarea');
            el.value = videoLink;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Link skopiowany do schowka! 🔗");
        }
    }

    // Start
    window.onload = loadVideos;
</script>
</body>
</html>
